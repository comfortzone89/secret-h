services:
  nextjs:
    image: shakenbake89/secret-h-next:latest
    container_name: nextjs
    environment:
      NODE_ENV: production
    depends_on:
      - socket

  socket:
    image: shakenbake89/secret-h-socket:latest
    container_name: socket
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis-data:/data

  nginx:
    build:
      context: ./nginx
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - nextjs
      - socket

volumes:
  redis-data:
