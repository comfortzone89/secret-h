version: "3.9"

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nextjs
      - socket

  nextjs:
    image: shakenbake89/secret-h-next:latest
    container_name: nextjs
    restart: unless-stopped
    environment:
      NODE_ENV: production

  socket:
    image: shakenbake89/secret-h-socket:latest
    container_name: socket
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data:
