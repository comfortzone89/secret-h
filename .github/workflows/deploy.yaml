name: Build & Push Docker Images

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Next.js image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.next
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/secret-h-next:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/secret-h-next:${{ github.sha }}

      - name: Build & push Socket server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: Dockerfile.socket
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/secret-h-socket:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/secret-h-socket:${{ github.sha }}
