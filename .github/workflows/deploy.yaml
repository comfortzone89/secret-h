name: Build, Push & Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # Checkout repository
      # ----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # Debug EB bundle files
      # ----------------------------
      - name: Debug EB bundle inputs
        run: |
          echo "===== Current working directory ====="
          pwd

          echo "===== List root files ====="
          ls -la

          echo "===== Dockerrun.aws.json contents ====="
          cat Dockerrun.aws.json

          echo "===== docker-compose.yml contents ====="
          cat docker-compose.yml

      # ----------------------------
      # Docker setup
      # ----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ----------------------------
      # Build & push images
      # ----------------------------
      - name: Build & push Next.js image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.next
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/secret-h-next:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/secret-h-next:${{ github.sha }}

      - name: Build & push Socket image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.socket
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/secret-h-socket:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/secret-h-socket:${{ github.sha }}

      - name: Build & push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.nginx
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/secret-h-nginx:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/secret-h-nginx:${{ github.sha }}

      # ----------------------------
      # AWS credentials
      # ----------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      # ----------------------------
      # Prepare EB bundle
      # ----------------------------
      - name: Package EB bundle
        run: |
          zip -j deploy.zip Dockerrun.aws.json docker-compose.yml

      # ----------------------------
      # Deploy to Elastic Beanstalk
      # ----------------------------
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
          aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
          application_name: secret-h
          environment_name: Secret-h-env
          version_label: ${{ github.sha }}
          region: us-east-1
          deployment_package: deploy.zip
